<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Studio — {{ news.title[:40] }}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#f1f5f9;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* TOP BAR */
.topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#111827;border-bottom:1px solid rgba(255,255,255,.08)}
.back-btn{color:#94a3b8;text-decoration:none;font-size:13px;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:#f1f5f9}
.studio-logo{font-size:15px;font-weight:700;color:#a78bfa;display:flex;align-items:center;gap:6px}
.stag{font-size:10px;background:rgba(167,139,250,.15);color:#a78bfa;padding:2px 7px;border-radius:4px;font-weight:600}
.top-actions{margin-left:auto;display:flex;gap:8px}
.tbtn{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.tbtn-save{background:#1e293b;color:#94a3b8;border:1px solid rgba(255,255,255,.1)}.tbtn-save:hover{color:#f1f5f9}
.tbtn-down{background:#4f46e5;color:#fff}.tbtn-down:hover{background:#3730a3}
.tbtn-post{background:#dc2626;color:#fff}.tbtn-post:hover{background:#b91c1c}
/* LAYOUT */
.studio-body{display:flex;flex:1;overflow:hidden}
/* LEFT PANEL */
.panel{width:300px;background:#111827;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.08)}
.ptab{flex:1;padding:11px 4px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;color:#64748b;border:none;background:none;transition:.15s}
.ptab.active{color:#a78bfa;border-bottom:2px solid #a78bfa}
.tab-pane{display:none;flex:1;overflow-y:auto;padding:16px}
.tab-pane.show{display:block}
.section-lbl{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
/* TEMPLATE PRESETS */
.presets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.preset{border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:.15s;aspect-ratio:16/9}
.preset:hover{border-color:#a78bfa}
.preset.active{border-color:#a78bfa}
/* CONTROLS */
.ctrl-group{margin-bottom:16px}
.ctrl-label{font-size:12px;color:#94a3b8;margin-bottom:6px;font-weight:500}
.ctrl-input{width:100%;background:#1e293b;border:1px solid rgba(255,255,255,.08);border-radius:7px;color:#f1f5f9;padding:8px 12px;font-size:13px;outline:none}
.ctrl-input:focus{border-color:#a78bfa}
textarea.ctrl-input{resize:vertical;min-height:80px;font-family:inherit}
.ctrl-row{display:flex;gap:8px}
.color-input{width:44px;height:36px;border:none;border-radius:7px;cursor:pointer;padding:2px}
.range-input{width:100%;accent-color:#a78bfa}
.format-btns{display:flex;gap:4px;margin-top:8px}
.fbtn{padding:5px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:#1e293b;color:#94a3b8;cursor:pointer;font-size:13px;font-weight:700;transition:.15s}
.fbtn.active,.fbtn:hover{background:#4f46e5;color:#fff;border-color:#4f46e5}
.add-btn{width:100%;padding:9px;border-radius:7px;border:1px dashed rgba(255,255,255,.15);background:none;color:#64748b;font-size:13px;cursor:pointer;transition:.15s}
.add-btn:hover{border-color:#a78bfa;color:#a78bfa}
/* DIR BTNS */
.dir-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:110px;margin:0 auto}
.dir-btn{padding:7px;border-radius:5px;border:1px solid rgba(255,255,255,.1);background:#1e293b;color:#94a3b8;cursor:pointer;text-align:center;font-size:13px;transition:.15s}
.dir-btn:hover{background:#4f46e5;color:#fff}
/* LAYERS */
.layer-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;background:#1e293b;margin-bottom:6px;font-size:13px;color:#94a3b8}
.layer-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.layer-name{flex:1;font-weight:500}
.vis-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#64748b}
/* CANVAS AREA */
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto;background:#0f0f1a}
canvas#card{border-radius:8px;box-shadow:0 24px 64px rgba(0,0,0,.7);cursor:crosshair}
/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="/published" class="back-btn">← Back</a>
  <div style="width:1px;height:20px;background:rgba(255,255,255,.1)"></div>
  <div class="studio-logo">🎨 Studio Pro <span class="stag">SaaS</span></div>
  <div class="top-actions">
    <button class="tbtn tbtn-save" onclick="saveCard()">💾 Save</button>
    <button class="tbtn tbtn-down" onclick="downloadCard()">⬇ Down</button>
    <button class="tbtn tbtn-post" onclick="postCard()">🚀 Post</button>
  </div>
</div>

<div class="studio-body">
  <!-- LEFT PANEL -->
  <div class="panel">
    <div class="tabs">
      <button class="ptab active" onclick="showTab('design',this)">Design</button>
      <button class="ptab" onclick="showTab('text',this)">Text</button>
      <button class="ptab" onclick="showTab('image',this)">Image</button>
      <button class="ptab" onclick="showTab('layer',this)">Layer</button>
    </div>

    <!-- DESIGN TAB -->
    <div class="tab-pane show" id="tab-design">
      <div class="section-lbl">🎨 Preset Designs</div>
      <div class="presets" id="presets-grid"></div>

      <div class="section-lbl" style="margin-top:4px">🛠 Customize</div>
      <div class="ctrl-group">
        <div class="ctrl-label">Background Color</div>
        <div class="ctrl-row">
          <input type="color" class="color-input" id="bg-color" value="#0f172a" oninput="render()">
          <input class="ctrl-input" id="bg-color-hex" value="#0f172a" oninput="syncColor(this.value)" style="flex:1">
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Accent Color</div>
        <div class="ctrl-row">
          <input type="color" class="color-input" id="accent-color" value="#ef4444" oninput="render()">
          <input class="ctrl-input" id="accent-hex" value="#ef4444" style="flex:1">
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Platform Format</div>
        <select class="ctrl-input" id="platform-sel" onchange="resizeCanvas()">
          <option value="1200,630">Landscape 1200×630 (Facebook/Twitter)</option>
          <option value="1080,1080">Square 1080×1080 (Instagram)</option>
          <option value="1080,1350">Portrait 1080×1350 (Instagram Story)</option>
          <option value="1200,627">LinkedIn 1200×627</option>
        </select>
      </div>
    </div>

    <!-- TEXT TAB -->
    <div class="tab-pane" id="tab-text">
      <div class="ctrl-group">
        <div class="ctrl-label">Headline</div>
        <textarea class="ctrl-input" id="txt-headline" oninput="render()" rows="3">{{ news.title }}</textarea>
        <div class="ctrl-label" style="margin-top:8px">Font Size</div>
        <input type="range" class="range-input" id="txt-size" min="20" max="80" value="44" oninput="render()">
        <div class="ctrl-row" style="margin-top:8px">
          <input type="color" class="color-input" id="txt-color" value="#ffffff" oninput="render()">
          <div class="format-btns">
            <button class="fbtn active" id="bold-btn" onclick="toggleFmt('bold')">B</button>
            <button class="fbtn" id="italic-btn" onclick="toggleFmt('italic')">I</button>
          </div>
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Subtitle / Summary</div>
        <textarea class="ctrl-input" id="txt-sub" oninput="render()" rows="3" placeholder="Optional subtitle..."></textarea>
        <div class="ctrl-label" style="margin-top:8px">Size</div>
        <input type="range" class="range-input" id="sub-size" min="12" max="40" value="22" oninput="render()">
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Date Text</div>
        <input class="ctrl-input" id="txt-date" value="{{ news.published_at.strftime('%d %B, %Y') if news.published_at else '' }}" oninput="render()">
      </div>
    </div>

    <!-- IMAGE TAB -->
    <div class="tab-pane" id="tab-image">
      <div class="ctrl-group">
        <div class="ctrl-label">Image URL</div>
        <input class="ctrl-input" id="img-url" value="{{ news.image_url or '' }}" placeholder="https://..." oninput="loadImage()">
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Zoom</div>
        <input type="range" class="range-input" id="img-zoom" min="50" max="300" value="100" oninput="render()">
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Position</div>
        <div class="dir-grid">
          <div></div>
          <button class="dir-btn" onclick="moveImg(0,-10)">↑</button>
          <div></div>
          <button class="dir-btn" onclick="moveImg(-10,0)">←</button>
          <button class="dir-btn" onclick="resetImg()">↺</button>
          <button class="dir-btn" onclick="moveImg(10,0)">→</button>
          <div></div>
          <button class="dir-btn" onclick="moveImg(0,10)">↓</button>
          <div></div>
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Overlay Opacity</div>
        <input type="range" class="range-input" id="overlay-opacity" min="0" max="90" value="60" oninput="render()">
      </div>
    </div>

    <!-- LAYER TAB -->
    <div class="tab-pane" id="tab-layer">
      <div class="section-lbl">Layer Management</div>
      <div id="layer-list">
        <div class="layer-row"><div class="layer-dot" style="background:#ef4444"></div><div class="layer-name">Frame / Overlay</div><button class="vis-btn" onclick="toggleLayer('overlay',this)">👁</button></div>
        <div class="layer-row"><div class="layer-dot" style="background:#3b82f6"></div><div class="layer-name">Date Text</div><button class="vis-btn" onclick="toggleLayer('date',this)">👁</button></div>
        <div class="layer-row"><div class="layer-dot" style="background:#22c55e"></div><div class="layer-name">Headline Text</div><button class="vis-btn" onclick="toggleLayer('headline',this)">👁</button></div>
        <div class="layer-row"><div class="layer-dot" style="background:#f59e0b"></div><div class="layer-name">News Image</div><button class="vis-btn" onclick="toggleLayer('image',this)">👁</button></div>
        <div class="layer-row"><div class="layer-dot" style="background:#a78bfa"></div><div class="layer-name">Subtitle</div><button class="vis-btn" onclick="toggleLayer('subtitle',this)">👁</button></div>
      </div>
    </div>
  </div>

  <!-- CANVAS AREA -->
  <div class="canvas-area">
    <canvas id="card"></canvas>
  </div>
</div>

<script>
const newsId = {{ news.id }};
let img = null, imgX=0, imgY=0;
const layers = {overlay:true, date:true, headline:true, image:true, subtitle:true};
let fmt = {bold:true, italic:false};

const PRESETS = [
  {name:'Breaking Dark',bg:'#0f172a',accent:'#ef4444',text:'#ffffff',overlay:0.7},
  {name:'Deep Blue',bg:'#0c1445',accent:'#6366f1',text:'#ffffff',overlay:0.65},
  {name:'Bold Red',bg:'#450a0a',accent:'#fbbf24',text:'#ffffff',overlay:0.75},
  {name:'Forest',bg:'#052e16',accent:'#22c55e',text:'#ffffff',overlay:0.65},
  {name:'Midnight',bg:'#0f0f0f',accent:'#ffffff',text:'#ffffff',overlay:0.55},
  {name:'Royal',bg:'#1e1b4b',accent:'#c084fc',text:'#ffffff',overlay:0.6},
];

function buildPresets(){
  const g=document.getElementById('presets-grid');
  PRESETS.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='preset'+(i===0?' active':'');
    d.title=p.name;
    const c=document.createElement('canvas');
    c.width=240;c.height=135;
    const ctx=c.getContext('2d');
    const gr=ctx.createLinearGradient(0,0,240,135);
    gr.addColorStop(0,p.bg);gr.addColorStop(1,shade(p.bg,-40));
    ctx.fillStyle=gr;ctx.fillRect(0,0,240,135);
    ctx.fillStyle=p.accent;ctx.fillRect(0,0,240,5);
    ctx.fillStyle=p.text;ctx.font='bold 11px Segoe UI';ctx.fillText(p.name,10,80);
    d.appendChild(c);
    d.onclick=()=>{
      document.querySelectorAll('.preset').forEach(el=>el.classList.remove('active'));
      d.classList.add('active');
      document.getElementById('bg-color').value=p.bg;
      document.getElementById('bg-color-hex').value=p.bg;
      document.getElementById('accent-color').value=p.accent;
      document.getElementById('accent-hex').value=p.accent;
      document.getElementById('overlay-opacity').value=Math.round(p.overlay*100);
      render();
    };
    g.appendChild(d);
  });
}

function getCanvas(){return document.getElementById('card')}
function getCtx(){return getCanvas().getContext('2d')}

function resizeCanvas(){
  const [w,h]=document.getElementById('platform-sel').value.split(',').map(Number);
  const canvas=getCanvas();
  canvas.width=w;canvas.height=h;
  const maxW=Math.min(700,window.innerWidth-380);
  const maxH=window.innerHeight-120;
  const scale=Math.min(maxW/w,maxH/h);
  canvas.style.width=Math.round(w*scale)+'px';
  canvas.style.height=Math.round(h*scale)+'px';
  loadImage();
}

function loadImage(){
  const url=document.getElementById('img-url').value.trim();
  if(!url){img=null;render();return;}
  const i=new Image();
  i.crossOrigin='anonymous';
  i.onload=()=>{img=i;render();};
  i.onerror=()=>{img=null;render();};
  i.src=url;
}

function moveImg(dx,dy){imgX+=dx;imgY+=dy;render();}
function resetImg(){imgX=0;imgY=0;document.getElementById('img-zoom').value=100;render();}

function shade(hex,n){
  const c=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,Math.max(0,((c>>16)&255)+n));
  const g=Math.min(255,Math.max(0,((c>>8)&255)+n));
  const b=Math.min(255,Math.max(0,(c&255)+n));
  return`#${((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1)}`;
}

function wrapText(ctx,text,x,y,maxW,lh,maxL){
  const words=text.split(' ');let line='',count=0;
  for(let i=0;i<words.length;i++){
    const test=line+words[i]+' ';
    if(ctx.measureText(test).width>maxW&&i>0){
      count++;
      if(maxL&&count>=maxL){let l=line.trim();while(ctx.measureText(l+'…').width>maxW&&l.length>0)l=l.slice(0,-1);ctx.fillText(l+'…',x,y);return count;}
      ctx.fillText(line.trim(),x,y);line=words[i]+' ';y+=lh;
    }else line=test;
  }
  if(line.trim())ctx.fillText(line.trim(),x,y);
  return count+1;
}

function render(){
  const canvas=getCanvas();const ctx=getCtx();
  const W=canvas.width,H=canvas.height;
  const bg=document.getElementById('bg-color').value;
  const accent=document.getElementById('accent-color').value;
  const txtColor=document.getElementById('txt-color').value;
  const pad=Math.round(W*0.05);

  // Background
  const bgGr=ctx.createLinearGradient(0,0,W,H);
  bgGr.addColorStop(0,bg);bgGr.addColorStop(1,shade(bg,-40));
  ctx.fillStyle=bgGr;ctx.fillRect(0,0,W,H);

  // Image layer
  if(layers.image&&img){
    const zoom=parseInt(document.getElementById('img-zoom').value)/100;
    const iw=W*zoom,ih=H*zoom;
    const ix=(W-iw)/2+imgX,iy=(H-ih)/2+imgY;
    ctx.drawImage(img,ix,iy,iw,ih);
  }

  // Overlay
  if(layers.overlay){
    const op=parseInt(document.getElementById('overlay-opacity').value)/100;
    const ov=ctx.createLinearGradient(0,H*0.3,0,H);
    ov.addColorStop(0,'rgba(0,0,0,0)');ov.addColorStop(1,`rgba(0,0,0,${op})`);
    ctx.fillStyle=ov;ctx.fillRect(0,0,W,H);
  }

  // Accent stripe top
  ctx.fillStyle=accent;ctx.fillRect(0,0,W,Math.round(H*0.008));

  // Breaking badge
  const badgeSz=Math.round(W*0.02);
  ctx.font=`700 ${badgeSz}px Segoe UI,Arial`;
  const bLabel='BREAKING';
  const bw=ctx.measureText(bLabel).width+Math.round(W*0.035);
  const bh=Math.round(H*0.052),by=Math.round(H*0.05);
  ctx.fillStyle=accent;
  ctx.beginPath();ctx.roundRect(pad,by,bw,bh,6);ctx.fill();
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(bLabel,pad+bw/2,by+bh/2);

  // Accent line
  const lineY=Math.round(H*0.58);
  ctx.fillStyle=accent;ctx.fillRect(pad,lineY-Math.round(H*0.015),Math.round(W*0.055),Math.round(H*0.005));

  // Headline
  if(layers.headline){
    const hSz=parseInt(document.getElementById('txt-size').value)/100*Math.round(W*0.055);
    const fmtStr=(fmt.italic?'italic ':'')+(fmt.bold?'bold ':'');
    ctx.font=`${fmtStr}${hSz}px Georgia,serif`;
    ctx.fillStyle=txtColor;ctx.textAlign='left';ctx.textBaseline='top';
    wrapText(ctx,document.getElementById('txt-headline').value||'',pad,lineY,W-pad*2,hSz*1.25,3);
  }

  // Subtitle
  if(layers.subtitle){
    const sub=document.getElementById('txt-sub').value.trim();
    if(sub){
      const subSz=parseInt(document.getElementById('sub-size').value)/100*Math.round(W*0.03);
      ctx.font=`${subSz}px Segoe UI,Arial`;
      ctx.fillStyle='rgba(255,255,255,0.7)';ctx.textAlign='left';ctx.textBaseline='top';
      const hSz=parseInt(document.getElementById('txt-size').value)/100*Math.round(W*0.055);
      wrapText(ctx,sub,pad,lineY+hSz*1.25*3.5,W-pad*2,subSz*1.5,3);
    }
  }

  // Date
  if(layers.date){
    const dTxt=document.getElementById('txt-date').value;
    const dSz=Math.round(W*0.02);
    ctx.font=`${dSz}px Segoe UI,Arial`;
    ctx.fillStyle='rgba(255,255,255,0.55)';ctx.textAlign='right';ctx.textBaseline='top';
    ctx.fillText(dTxt,W-pad,Math.round(H*0.04));
  }

  // Bottom bar
  const barH=Math.round(H*0.07);
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(0,H-barH,W,barH);
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font=`${Math.round(W*0.018)}px Segoe UI,Arial`;
  ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.fillText('NewsForge',W-pad,H-barH/2);
}

function syncColor(hex){if(/^#[0-9a-fA-F]{6}$/.test(hex)){document.getElementById('bg-color').value=hex;render();}}
function toggleFmt(type){fmt[type]=!fmt[type];document.getElementById(type+'-btn').classList.toggle('active',fmt[type]);render();}
function toggleLayer(name,btn){layers[name]=!layers[name];btn.style.opacity=layers[name]?'1':'0.3';render();}

function showTab(id,btn){
  document.querySelectorAll('.tab-pane').forEach(el=>el.classList.remove('show'));
  document.querySelectorAll('.ptab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('show');
  btn.classList.add('active');
}

async function saveCard(){
  const canvas=getCanvas();
  const cardData={bg:document.getElementById('bg-color').value,accent:document.getElementById('accent-color').value,headline:document.getElementById('txt-headline').value,subtitle:document.getElementById('txt-sub').value,image_url:document.getElementById('img-url').value};
  await fetch(`/api/news/${newsId}/card`,{method:'POST',body:JSON.stringify(cardData),headers:{'Content-Type':'application/json'}});
  showToast('Card saved!');
}

function downloadCard(){
  const canvas=getCanvas();
  const tmp=document.createElement('canvas');
  tmp.width=canvas.width;tmp.height=canvas.height;
  tmp.getContext('2d').drawImage(canvas,0,0);
  const a=document.createElement('a');
  a.download=`newsforge-card-${newsId}.png`;
  a.href=tmp.toDataURL('image/png');a.click();
  showToast('Downloaded!');
}

async function postCard(){
  await fetch(`/api/news/${newsId}/publish`,{method:'POST'});
  showToast('Published! Redirecting...');
  setTimeout(()=>window.location.href='/published',1500);
}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;background:#1e293b;color:#f1f5f9;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;border:1px solid rgba(255,255,255,.1)';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

buildPresets();
resizeCanvas();
// Load existing image
if('{{ news.image_url }}') loadImage();
window.addEventListener('resize',resizeCanvas);
</script>
</body>
</html>
